schema_version: "1.0"
sources:
  - id: sysmon_process_create
    display_name: "Sysmon Process Create"
    provider: "Microsoft-Windows-Sysmon"
    channel: "Microsoft-Windows-Sysmon/Operational"
    event_ids: [1]
    source_type: "endpoint_process"
    collection_status: "validated_in_detfuzz_lab"
    required_fields: [UtcTime, ProcessGuid, ProcessId, Image, CommandLine, ParentImage, ParentProcessGuid, ParentProcessId, User, LogonGuid, LogonId, Hashes]
    volume_measurement_status: "lab_24h_measurement"
  - id: powershell_script_block
    display_name: "PowerShell Script Block Logging"
    provider: "Microsoft-Windows-PowerShell"
    channel: "Microsoft-Windows-PowerShell/Operational"
    event_ids: [4104]
    source_type: "script_content"
    collection_status: "cataloged_not_vm_validated"
    required_fields: [TimeCreated, ProviderName, EventId, ScriptBlockText, ScriptBlockId, Path, UserId]
    volume_measurement_status: "lab_24h_measurement"
  - id: windows_security_logon
    display_name: "Windows Security Logon Events"
    provider: "Microsoft-Windows-Security-Auditing"
    channel: "Security"
    event_ids: [4624, 4625]
    source_type: "authentication"
    collection_status: "cataloged_not_vm_validated"
    required_fields: [TimeCreated, EventId, TargetUserName, TargetDomainName, LogonType, IpAddress, WorkstationName, Status, SubjectUserName]
    volume_measurement_status: "lab_24h_measurement"
